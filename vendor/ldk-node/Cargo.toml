[package]
edition = "2021"
name = "ldk-node"
version = "0.4.3"
authors = ["Elias Rohrer <dev@tnull.de>"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A ready-to-go node implementation built using LDK."
homepage = "https://lightningdevkit.org/"
readme = "README.md"
keywords = [
    "bitcoin",
    "lightning",
    "ldk",
    "bdk",
]
categories = ["cryptography::cryptocurrencies"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/lightningdevkit/ldk-node/"

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[profile.release-smaller]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
inherits = "release"

[lib]
name = "ldk_node"
crate-type = [
    "lib",
    "staticlib",
    "cdylib",
]
path = "src/lib.rs"

[[test]]
name = "integration_tests_cln"
path = "tests/integration_tests_cln.rs"

[[test]]
name = "integration_tests_rust"
path = "tests/integration_tests_rust.rs"

[[test]]
name = "integration_tests_vss"
path = "tests/integration_tests_vss.rs"

